<section class="min-vh-100 bg-light py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-7">
        <div class="card border-0 shadow-sm rounded-4">
          <div class="card-body p-4 p-lg-5">

            <div class="text-center mb-4">
              <div class="fs-1">🏢</div>
              <h3 class="fw-bold">Complete Your Company Profile</h3>
              <p class="text-muted">Tell us more about your company</p>
            </div>

            @if(errorMessage) {
              <div class="alert alert-danger">{{ errorMessage }}</div>
            }

            <form (ngSubmit)="onSubmit()">

              <div class="mb-3">
                <label class="form-label fw-semibold">
                  Domain of Activity *
                </label>
                <input
                  type="text"
                  class="form-control"
                  [(ngModel)]="form.domainOfActivity"
                  name="domainOfActivity"
                  placeholder="e.g. Software Development"
                  required
                />
              </div>

              <div class="mb-3">
                <label class="form-label fw-semibold">
                  Company Size *
                </label>
                <input
                  type="number"
                  class="form-control"
                  [(ngModel)]="form.companySize"
                  name="companySize"
                  placeholder="e.g. 50"
                  min="1"
                  required
                />
              </div>

              <div class="mb-3">
                <label class="form-label fw-semibold">
                  Description
                </label>
                <textarea
                  class="form-control"
                  rows="4"
                  [(ngModel)]="form.description"
                  name="description"
                  placeholder="Tell students about your company..."
                ></textarea>
              </div>

              <div class="mb-4">
                <label class="form-label fw-semibold">
                  Website Link
                </label>
                <input
                  type="url"
                  class="form-control"
                  [(ngModel)]="form.websiteLink"
                  name="websiteLink"
                  placeholder="https://yourcompany.com"
                />
              </div>

              @if(isLoading) {
                <div class="text-center mb-3">
                  <div class="spinner-border spinner-border-sm text-primary"></div>
                </div>
              }

              <button
                type="submit"
                class="btn btn-primary btn-lg w-100"
                [disabled]="isLoading"
              >
                {{ isLoading ? 'Saving...' : 'Complete Profile' }}
              </button>

            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
