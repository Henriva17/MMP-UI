


<!-- choose-role.component.html -->
<section class="min-vh-100 d-flex align-items-center bg-light py-5">
  <div class="container">
    <div class="text-center mb-5">
      <h2 class="fw-bold">Welcome to MMP</h2>
      <p class="text-muted">How would you like to use the platform?</p>
    </div>

    <div class="row justify-content-center g-4">

      <!-- Student -->
      <div class="col-md-5">
        <div class="card border-0 shadow-sm rounded-4 h-100 text-center p-4">
          <div class="card-body">
            <div class="fs-1 mb-3">🎓</div>
            <h4 class="fw-bold">I am a Student</h4>
            <p class="text-muted mb-4">
              Find internships, build your profile and track your applications.
            </p>
            <button class="btn btn-primary w-100" (click)="chooseStudent()">
              Continue as Student
            </button>
          </div>
        </div>
      </div>

      <!-- Company -->
      <div class="col-md-5">
        <div class="card border-0 shadow-sm rounded-4 h-100 text-center p-4">
          <div class="card-body">
            <div class="fs-1 mb-3">🏢</div>
            <h4 class="fw-bold">I am a Company</h4>
            <p class="text-muted mb-4">
              Post jobs, find qualified candidates and manage applications.
            </p>
            <button class="btn btn-outline-primary w-100" (click)="chooseCompany()">
              Continue as Company
            </button>
          </div>
        </div>
      </div>

    </div>
  </div>
</section>
