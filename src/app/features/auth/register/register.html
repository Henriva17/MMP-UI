<section class="min-vh-100 d-flex align-items-center bg-light py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-8 col-lg-5">
        <div class="card border-0 shadow-sm rounded-4">
          <div class="card-body p-4 p-lg-5">

            <div class="text-center mb-4">
              <h2 class="fw-bold mb-2">Create your account</h2>
              <p class="text-muted mb-0">
                Join MMP and start connecting with opportunities.
              </p>
            </div>

            <form (ngSubmit) = "onSubmit()">
              <div class="mb-3">
                <label class="form-label fw-semibold">Full name</label>
                <input
                  type="text"
                  class="form-control form-control-lg"
                  placeholder="Enter your full name"
                  [(ngModel)]="fullName"
                  name="fullName"
                />
              </div>

              <div class="mb-3">
                <label class="form-label fw-semibold">Email address</label>
                <input
                  type="email"
                  class="form-control form-control-lg"
                  placeholder="name@example.com"
                  [(ngModel)]="email"
                  name="email"
                />
              </div>

              <div class="mb-3">
                <label class="form-label fw-semibold">Password</label>
                <input
                  type="password"
                  class="form-control form-control-lg"
                  placeholder="Create a password"
                  [(ngModel)]="password"
                  name="password"
                />
              </div>

              <div class="mb-4">
                <label class="form-label fw-semibold">Confirm password</label>
                <input 
                  type="password"
                  class="form-control form-control-lg"
                  placeholder="Confirm your password"
                  [(ngModel)]="confirmPassword"
                  name="confirmPassword"
                />
              </div>

              <button type="submit" class="btn btn-primary btn-lg w-100">
                Create Account
            
              </button>
            </form>

            <p class="text-center text-muted mt-4 mb-0">
              Already have an account?
              <a routerLink="/login" class="text-decoration-none fw-semibold">
                Login
              </a>
            </p>

          </div>
        </div>
      </div>
    </div>
  </div>
</section>
