<div class="container py-5">

  <!-- Welcome -->
  <div class="mb-5">
    <h2 class="fw-bold">Welcome back, {{ fullName }} 👋</h2>
    <p class="text-muted">Here is your personal dashboard</p>
  </div>

  <div class="row g-4">

    <!-- My Profile -->
    <div class="col-md-6 col-lg-4">
      <div class="card border-0 shadow-sm rounded-4 h-100">
        <div class="card-body p-4">
          <div class="fs-2 mb-3">👤</div>
          <h5 class="fw-bold">My Profile</h5>
          <p class="text-muted">View and update your student profile</p>
          <a routerLink="/student/profile" class="btn btn-outline-primary w-100 mt-2">
            View Profile
          </a>
        </div>
      </div>
    </div>

    <!-- Recommended Jobs -->
    <div class="col-md-6 col-lg-4">
      <div class="card border-0 shadow-sm rounded-4 h-100">
        <div class="card-body p-4">
          <div class="fs-2 mb-3">💼</div>
          <h5 class="fw-bold">Recommended Jobs</h5>
          <p class="text-muted">Browse and apply to jobs matching your profile</p>
          <a routerLink="/jobs" class="btn btn-outline-primary w-100 mt-2">
            Browse Jobs
          </a>
        </div>
      </div>
    </div>

    <!-- My Applications -->
    <div class="col-md-6 col-lg-4">
      <div class="card border-0 shadow-sm rounded-4 h-100">
        <div class="card-body p-4">
          <div class="fs-2 mb-3">📋</div>
          <h5 class="fw-bold">My Applications</h5>
          <p class="text-muted">Track and manage your job applications</p>
          <a routerLink="/student/applications" class="btn btn-outline-primary w-100 mt-2">
            View Applications
          </a>
        </div>
      </div>
    </div>

  </div>
</div>
